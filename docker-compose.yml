services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "4433:443"
      - "4433:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:Z
      - ./:/srv/senjuCTF:Z
      - caddy_data:/data:Z
      - caddy_config:/config:Z

volumes:
  caddy_data:
  caddy_config:
